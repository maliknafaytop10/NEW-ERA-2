<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEN Z ERA | The Era of 2000–2026</title>
    <!-- Tailwind CSS for Modern Premium UI, Glassmorphism, and Responsiveness -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#000000',
                            white: '#ffffff',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-black text-white font-sans antialiased min-h-screen flex flex-col selection:bg-purple-500 selection:text-white">

    <!-- =========================
         LOADING SCREEN
    ========================= -->
    <div id="loading-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black" aria-label="Loading Screen" role="status">
        <div class="flex items-center gap-4 mb-6">
            <i class="fas fa-bolt text-5xl text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-yellow-500 to-green-500"></i>
        </div>
        <div class="text-5xl font-extrabold mb-4 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-green-500 to-blue-500 animate-pulse">GEN Z ERA</div>
        <p class="text-gray-400 mb-8 font-medium tracking-wide">Loading The Era...</p>
        <div id="progress-container" class="w-72 h-3 bg-white/10 rounded-full overflow-hidden border border-white/20 shadow-[0_0_15px_rgba(255,255,255,0.1)]">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-red-500 via-green-500 to-blue-500 w-1/2 rounded-full relative">
                <div class="absolute inset-0 bg-white/20 w-full h-full"></div>
            </div>
        </div>
    </div>

    <!-- =========================
         HEADER
    ========================= -->
    <header class="fixed top-0 w-full z-40 bg-black/40 backdrop-blur-xl border-b border-white/10 shadow-lg" aria-label="Main Navigation">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-red-500 via-purple-500 to-blue-500 p-[2px]">
                    <div class="w-full h-full bg-black rounded-full flex items-center justify-center text-white font-bold text-lg">
                        GZ
                    </div>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">GEN Z ERA</h1>
                    <p class="text-xs text-transparent bg-clip-text bg-gradient-to-r from-red-400 via-green-400 to-blue-400 font-semibold tracking-wide">The Era of 2000–2026</p>
                </div>
            </div>

            <nav class="flex items-center gap-3 md:gap-5" aria-label="Header Actions">
                <div class="hidden lg:flex items-center bg-white/5 border border-white/10 rounded-full px-4 py-2 hover:bg-white/10 transition-colors">
                    <input type="search" id="header-search-input" placeholder="Search trends..." class="bg-transparent border-none outline-none text-sm w-56 px-2 text-white placeholder-gray-500" aria-label="Search Input">
                    <button aria-label="Submit Search" class="text-gray-400 hover:text-white transition-colors"><i class="fas fa-search"></i></button>
                </div>

                <button aria-label="Open Search Modal" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
                    <i class="fas fa-search"></i>
                </button>

                <button aria-label="Sign In" class="hidden md:block text-sm font-bold bg-white text-black hover:bg-gray-200 px-6 py-2 rounded-full transition-colors shadow-[0_0_10px_rgba(255,255,255,0.2)]">Sign In</button>
                
                <button aria-label="Help" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
                    <i class="fas fa-question"></i>
                </button>

                <button aria-label="Toggle Dark Mode" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
                    <i class="fas fa-moon"></i>
                </button>

                <button aria-label="User Profile" class="w-10 h-10 flex items-center justify-center rounded-full bg-gradient-to-r from-purple-600 to-blue-600 text-white hover:opacity-80 transition-opacity shadow-lg">
                    <i class="fas fa-user"></i>
                </button>
            </nav>
        </div>
    </header>

    <!-- =========================
         MAIN CONTENT
    ========================= -->
    <main class="flex-grow container mx-auto px-4 pt-32 pb-16">

        <!-- =========================
             HERO SECTION
        ========================= -->
        <section id="hero" class="relative py-16 px-6 mb-16 rounded-[2.5rem] bg-white/5 backdrop-blur-2xl border border-white/10 overflow-hidden shadow-[0_0_50px_rgba(255,255,255,0.05)] text-center" aria-labelledby="hero-title">
            <div class="absolute inset-0 bg-gradient-to-br from-red-500/10 via-green-500/10 to-blue-500/10 pointer-events-none"></div>
            
            <div class="relative z-10 flex flex-col items-center">

                <p class="text-xl md:text-3xl text-gray-300 mb-10 font-light tracking-wide">The Era of <strong class="text-white font-bold">2000–2026</strong></p>
                
                <div class="flex flex-col sm:flex-row flex-wrap justify-center gap-5 w-full max-w-3xl">
                    <button class="flex-1 min-w-[200px] bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 px-8 rounded-full shadow-[0_0_20px_rgba(147,51,234,0.4)] transition-all flex items-center justify-center gap-3 text-lg" aria-label="Start Quiz">
                        <i class="fas fa-play"></i> Start Quiz
                    </button>
                    <button class="flex-1 min-w-[200px] bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-4 px-8 rounded-full transition-all flex items-center justify-center gap-3 text-lg" aria-label="Random Quiz">
                        <i class="fas fa-dice"></i> Random Quiz
                    </button>
                    <button class="flex-1 min-w-[200px] bg-gradient-to-r from-amber-500 to-red-600 hover:from-amber-400 hover:to-red-500 text-white font-bold py-4 px-8 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-all flex items-center justify-center gap-3 text-lg" aria-label="Daily Challenge">
                        <i class="fas fa-fire"></i> Daily Challenge
                    </button>
                </div>
            </div>
        </section>

        <!-- =========================
             DAILY CHALLENGE
        ========================= -->
        <section id="daily-challenge" class="mb-16" aria-labelledby="daily-challenge-title">
            <h3 id="daily-challenge-title" class="sr-only">Daily Challenge</h3>
            <div class="bg-gradient-to-r from-orange-600/20 to-red-600/20 border border-orange-500/30 rounded-3xl p-8 flex flex-col md:flex-row items-center justify-between backdrop-blur-xl relative overflow-hidden group">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-orange-500/20 rounded-full blur-3xl group-hover:bg-orange-500/30 transition-all"></div>
                
                <div class="flex flex-col md:flex-row items-center gap-6 mb-6 md:mb-0 relative z-10 text-center md:text-left">
                    <div class="bg-gradient-to-br from-orange-400 to-red-600 w-20 h-20 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/30">
                        <i class="fas fa-calendar-star text-4xl text-white"></i>
                    </div>
                    <div>
                        <h4 class="text-3xl font-black text-white mb-2">Today's Quiz</h4>
                        <p class="text-gray-300 text-lg">Test your knowledge on the greatest hits of 2026!</p>
                    </div>
                </div>
                
                <button class="relative z-10 bg-white text-black font-bold py-4 px-10 rounded-full hover:bg-gray-200 transition-colors shadow-xl text-lg flex items-center gap-3" aria-label="Play Daily Challenge">
                    Play Now <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </section>

        <!-- =========================
             CATEGORY SECTION
        ========================= -->

            <div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-white/10 pb-4">
                <div>
                    <h3 id="categories-title" class="text-4xl font-black text-white mb-2">Explore Categories</h3>
                    <p class="text-gray-400 text-lg">Select a topic and prove your Gen Z expertise.</p>
                </div>
            </div>

            <div class="flex flex-col gap-5">
                
                <!-- Card 1 -->
                <button class="w-full group flex items-center justify-between p-5 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/30 rounded-3xl backdrop-blur-md transition-all text-left" aria-label="Category: MCQS">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 flex items-center justify-center bg-gradient-to-br from-blue-500/20 to-cyan-500/20 border border-blue-500/30 text-cyan-400 rounded-2xl text-4xl group-hover:scale-110 transition-transform shadow-lg">
                            <i class="fas fa-list-ul"></i>

                        <div>
                            <h4 class="text-2xl font-bold text-white mb-1">MCQS</h4>

                            <i class="fas fa-heart"></i>
                        </div>
                        <div>
                            <h4 class="text-2xl font-bold text-white mb-1">YOUR FAVORITES</h4>

                    </div>
                    <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-gray-400 group-hover:bg-white group-hover:text-black transition-all mr-2">
                        <i class="fas fa-arrow-right text-xl"></i>
                    </div>
                </button>

                <!-- Card 3 -->
                <button class="w-full group flex items-center justify-between p-5 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/30 rounded-3xl backdrop-blur-md transition-all text-left" aria-label="Category: LONG QUESTIONS">

                        <div>
                            <h4 class="text-2xl font-bold text-white mb-1">LONG QUESTIONS</h4>

                            <i class="fas fa-puzzle-piece"></i>
                        </div>
                        <div>
                            <h4 class="text-2xl font-bold text-white mb-1">PUZZLES</h4>
                            <p class="text-gray-400">30 Questions • Brain Teasers & Logic</p>

                    </div>
                    <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-gray-400 group-hover:bg-white group-hover:text-black transition-all mr-2">
                        <i class="fas fa-arrow-right text-xl"></i>
                    </div>
